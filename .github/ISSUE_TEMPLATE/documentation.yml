name: Documentation
description: Suggest README, methodology, source, setup, or contributor documentation changes.
title: "Docs: "
labels:
  - documentation
body:
  - type: textarea
    id: issue
    attributes:
      label: Documentation issue
      description: What is missing, confusing, outdated, or incorrect?
    validations:
      required: true
  - type: textarea
    id: suggested_change
    attributes:
      label: Suggested change
      description: What should the docs say instead?
  - type: input
    id: page
    attributes:
      label: File or page
      placeholder: README.md, CONTRIBUTING.md, /about, /open-data
