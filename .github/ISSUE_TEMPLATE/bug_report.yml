name: Bug report
description: Report a broken route, UI bug, export issue, or unexpected behavior.
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve HEStats. Please include enough detail for someone else to reproduce the issue.
  - type: input
    id: route
    attributes:
      label: Route or page
      description: "Example: /universities/oxford or /open-data"
      placeholder: /rankings
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and device
      placeholder: Chrome on macOS, Safari on iPhone, etc.
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or logs
      description: Add screenshots, console errors, or terminal output if useful.
